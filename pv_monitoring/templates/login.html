<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h1>PV Monitoring Login</h1>

<form id="loginForm">

    <input
        type="text"
        id="username"
        placeholder="Username">

    <br><br>

    <input
        type="password"
        id="password"
        placeholder="Password">

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<script>

document
.getElementById("loginForm")
.addEventListener(
"submit",
async function(e){

    e.preventDefault()

    const username =
        document.getElementById(
            "username"
        ).value

    const password =
        document.getElementById(
            "password"
        ).value

    const response =
        await fetch(
            "/auth/login",
            {
                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:JSON.stringify({
                    username,
                    password
                })
            }
        )

    const result =
        await response.json()

    alert(result.message)
})

</script>

</body>
</html>
